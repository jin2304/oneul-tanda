spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://oneultanda-user-db:3306/user_db
    username: admin
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: redis
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10
          max-wait: 1000ms

  kafka:
    bootstrap-servers: kafka:29092


server:
  port: 19093

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:19090/eureka/
    register-with-eureka: true

jwt:
  issuer: "oneul-tanda"
  secret: ${JWT_SECRET_KEY}
  access-expiration: 30 # Access Token: min
  refresh-expiration: 7 # Refresh Token: day