server:
  port: 19094

spring:
  application:
    name: flight-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://flight-db:5432/flight_db
    username: admin
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      jdbc:
        time_zone: UTC
      hibernate:
        format_sql: true
        show_sql: true

  data:
    redis:
      host: redis
      port: 6379

amadeus:
  base-url: https://test.api.amadeus.com
  client-id: ${AMADEUS_CLIENT_ID}
  client-secret: ${AMADEUS_CLIENT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:19090/eureka/

logging:
  level:
    org:
      hibernate:
        SQL: debug
        type: trace