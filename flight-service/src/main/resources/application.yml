server:
  port: 19094

spring:
  application:
    name: flight-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/flight_db
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      jdbc:
        time_zone: UTC
      hibernate:
        format_sql: true
        show_sql: true

  data:
    redis:
      host: localhost
      port: 6379
    cache:
        type: redis
        redis:
          time-to-live: 300000 # 기본 TTL: 5분
          cache-null-values: true # null 캐싱 방지

amadeus:
  base-url: https://test.api.amadeus.com
  client-id: ${AMADEUS_CLIENT_ID}
  client-secret: ${AMADEUS_CLIENT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

logging:
  level:
    org:
      hibernate:
        SQL: debug
        type: trace