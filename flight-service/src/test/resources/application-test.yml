server:
  port: 19094

spring:
  application:
    name: flight-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/flight_db
    username: admin
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  data:
    redis:
      host: localhost
      port: 6379

amadeus:
  base-url: https://test.api.amadeus.com
  client-id: test-client-id
  client-secret: test-client-secret

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

logging:
  level:
    org:
      hibernate:
        SQL: debug
        type: trace